                      <button > <i class="fa-solid fa-download fa-bounce" style="color: #437fcc;"></i> Download App</button>
                   </div>   
            </div>
       </div> 
         <div class="col-lg-6 display-lg-block display-none">
                <div class="FillDiv">
                   <p>Get in touch with <span>Projnt !</span></p>
                  <input type="text" placeholder="Full Name">
                   <input type="email" placeholder="Enter your email">
                   <input type="phone" placeholder="Phone Number">
                   <input type="text" placeholder="Interest in Projects">
                   <select name="profe" id="">
                    <option value="profe">Select your profession</option>
                    <option value="profe">Student</option>
                    <option value="profe">Developer</option>
                    <option value="profe">Designer</option>
                    <option value="profe">Marketer</option>
                    <option value="profe">Entrepreneur</option>
                    <option value="profe">Other</option>
